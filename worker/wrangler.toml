name = "lazypo-auth-gate"
main = "src/worker.js"
compatibility_date = "2025-01-01"

# Don't expose the Worker on workers.dev — only via the configured route.
workers_dev = false

# Match every request under /lazypo/* on the prod zone. GitHub Pages
# (configured as the origin in your Cloudflare DNS) serves the actual
# files; the Worker is the gate in front.
[[routes]]
pattern = "ndashiz.be/lazypo/*"
zone_name = "ndashiz.be"

# Public Supabase project reference (already in client code — not a secret).
# Used to build the JWKS URL: https://<ref>.supabase.co/auth/v1/.well-known/jwks.json
# The Worker fetches the project's PUBLIC signing keys to verify ES256 JWTs.
[vars]
SUPABASE_PROJECT_REF = "hrvxhnmtvzvrsmmmmtsv"
